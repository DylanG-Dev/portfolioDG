services:
    app:
        image: node:24.12.0
        # -- --host : Vite doit écouter sur toutes les interfaces, pas seulement le localhost du conteneur
        command: sh -c "npm install && npm run dev -- --host"
        # format hôte:conteneur, sinon Docker publie sur un port aléatoire
        ports:
          - "5173:5173"
        # monte le dossier du projet dans le conteneur (chemin Linux interne)
        volumes:
          - .:/app
        working_dir: /app