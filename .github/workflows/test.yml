name: Test Project

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    container:
      image: node:24.12.0
    steps:
      - uses: actions/checkout@v3
        with:
          node-version: 24.12.0
      - run: npm ci
      - run: npm test
      - run: npm run build